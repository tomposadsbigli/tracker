<!DOCTYPE html>
<html>
<head>
  <title>Truck GPS Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    body { margin:0; font-family:sans-serif; }
    #map { height: 95vh; }
    #info { padding:10px; background:#fff; }
  </style>
</head>
<body>

<div id="info">Loading...</div>
<div id="map"></div>

<script>
// ================= MAP =================
var map = L.map('map').setView([52.3, 4.7], 8);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ================= POINTS =================
var start = [52.3395, 4.8730]; // Edge Amsterdam
var end = [51.9700, 4.0500];   // Europoort

// ================= ICON =================
var icon = L.icon({
  iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
  iconSize: [40,40],
  iconAnchor: [20,40]
});

var marker = L.marker(start, {icon: icon}).addTo(map);

// ================= TIME =================
var startTime = Date.now();
var DRIVE_TIME = 88 * 60; // 1ч 28 мин
var STOP_TIME = 3 * 24 * 60 * 60; // 3 дня

// ================= ROUTE (REAL API) =================
var routeCoords = [];
var totalDist = 0;
var distances = [];

fetch(`https://router.project-osrm.org/route/v1/driving/${start[1]},${start[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`)
.then(res => res.json())
.then(data => {
  routeCoords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);

  // draw route
  L.polyline(routeCoords, {color:'blue'}).addTo(map);

  // calculate distances
  function dist(a,b){
    var R=6371;
    var dLat=(b[0]-a[0])*Math.PI/180;
    var dLng=(b[1]-a[1])*Math.PI/180;
    var x=Math.sin(dLat/2)**2 + Math.sin(dLng/2)**2 *
      Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180);
    return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
  }

  for(let i=0;i<routeCoords.length-1;i++){
    let d = dist(routeCoords[i], routeCoords[i+1]);
    distances.push(d);
    totalDist += d;
  }

  animate();
});

// ================= TRUCK BEHAVIOR =================
function getSpeedFactor() {
  // имитация грузовика: ускорение/торможение
  return 0.7 + Math.random()*0.6;
}

var stopTimer = 0;
var isStopped = false;

// ================= ANIMATION =================
function animate(){
  let elapsed = (Date.now() - startTime)/1000;

  let progress;

  if (elapsed <= DRIVE_TIME) {
    progress = elapsed / DRIVE_TIME;
  } else if (elapsed <= DRIVE_TIME + STOP_TIME) {
    progress = 1;
  } else {
    progress = 1;
  }

  // если стоим 3 дня
  if (progress === 1 && elapsed > DRIVE_TIME) {
    marker.setLatLng(routeCoords[routeCoords.length-1]);
    map.setView(routeCoords[routeCoords.length-1]);

    document.getElementById('info').innerText =
      "Status: STOPPED (PORT)\nTime: " + formatTime(elapsed);

    requestAnimationFrame(animate);
    return;
  }

  // случайные остановки (как светофор/пробка)
  if (!isStopped && Math.random() < 0.005) {
    isStopped = true;
    stopTimer = 3 + Math.random()*10;
  }

  if (isStopped) {
    stopTimer -= 0.016;
    if (stopTimer <= 0) isStopped = false;

    document.getElementById('info').innerText =
      "Status: STOP (traffic)\nTime: " + formatTime(elapsed);

    requestAnimationFrame(animate);
    return;
  }

  // движение
  let curDist = totalDist * progress * getSpeedFactor();

  let passed = 0;
  for(let i=0;i<distances.length;i++){
    if(passed + distances[i] >= curDist){
      let p = (curDist - passed)/distances[i];
      let a = routeCoords[i];
      let b = routeCoords[i+1];

      let lat = a[0] + (b[0]-a[0]) * p;
      let lng = a[1] + (b[1]-a[1]) * p;

      // GPS jitter
      lat += (Math.random()-0.5)*0.0003;
      lng += (Math.random()-0.5)*0.0003;

      marker.setLatLng([lat,lng]);
      map.setView([lat,lng]);

      break;
    }
    passed += distances[i];
  }

  document.getElementById('info').innerText =
    "Status: DRIVING\nTime: " + formatTime(elapsed);

  requestAnimationFrame(animate);
}

// ================= TIME FORMAT =================
function formatTime(sec){
  let h = Math.floor(sec/3600);
  let m = Math.floor((sec%3600)/60);
  let s = Math.floor(sec%60);

  return h.toString().padStart(2,'0') + ":" +
         m.toString().padStart(2,'0') + ":" +
         s.toString().padStart(2,'0');
}

</script>
</body>
</html>
